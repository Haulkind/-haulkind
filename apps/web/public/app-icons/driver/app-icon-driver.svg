<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <rect x="0" y="0" width="1024" height="1024" rx="200" fill="#1E293B"/>
  
  <!-- Steering wheel -->
  <circle cx="512" cy="400" r="220" fill="none" stroke="#0D9488" stroke-width="24"/>
  <circle cx="512" cy="400" r="70" fill="#0D9488"/>
  
  <!-- Steering wheel spokes -->
  <line x1="512" y1="180" x2="512" y2="330" stroke="#0D9488" stroke-width="18" stroke-linecap="round"/>
  <line x1="310" y1="480" x2="442" y2="430" stroke="#0D9488" stroke-width="18" stroke-linecap="round"/>
  <line x1="714" y1="480" x2="582" y2="430" stroke="#0D9488" stroke-width="18" stroke-linecap="round"/>
  
  <!-- HK in center of steering wheel -->
  <text x="512" y="420" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="72" fill="#FFFFFF" letter-spacing="-4">HK</text>
  
  <!-- Orange speed accent line -->
  <rect x="200" y="700" width="624" height="14" rx="7" fill="#F97316" opacity="0.7"/>
  
  <!-- DRIVER badge -->
  <rect x="300" y="735" width="424" height="100" rx="28" fill="#F97316"/>
  <text x="512" y="800" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="52" fill="#FFFFFF" letter-spacing="8">DRIVER</text>
</svg>
